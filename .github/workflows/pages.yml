name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    env:
      VITE_BASE: /university-social/
      VITE_API_BASE: ${{ vars.VITE_API_BASE || 'http://localhost:8081/api/v1' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            admin/package-lock.json

      - name: Build Frontend (uni-app H5)
        working-directory: frontend
        run: |
          npm ci
          npm run build:h5
          mkdir -p ../dist/h5
          cp -r dist/build/h5/* ../dist/h5/ 2>/dev/null || cp -r dist/* ../dist/h5/ 2>/dev/null || true

      - name: Build Admin
        working-directory: admin
        run: |
          npm ci
          npx vite build
          mkdir -p ../dist/admin
          cp -r dist/* ../dist/admin/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
