version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: university_social
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      SERVER_ADDR: ":8081"
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/university_social?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      JWT_SECRET: "${JWT_SECRET:-change-me-in-production}"
      WECHAT_APP_ID: "${WECHAT_APP_ID}"
      WECHAT_SECRET: "${WECHAT_SECRET}"
      ADMIN_USER_IDS: "${ADMIN_USER_IDS:-1}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
